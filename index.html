<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jacquarda+Bastarda+9&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Jacquarda Bastarda 9", cursive;
        }

        section {
            position: relative;
            width: 100%;
            margin: 0 auto;
            min-height: 100vh;
            background-image: url('./imgs/pattern.png');
            padding: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header .logo {
            position: relative;
            max-width: 80px;
        }

        header ul {
            position: relative;
            display: flex;
        }

        header ul li {
            list-style: none;
        }

        header ul li a {
            display: inline-block;
            color: #34283f;
            margin-left: 40px;
            text-decoration: none;
        }

        .content {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content .textBox {
            position: relative;
            max-width: 600px;
        }

        .content .textBox h2 {
            color: #34283f;
            font-size: 4em;
            line-height: 1.4em;
            font-weight: 500;
        }
        .content .textBox h2 span {
            color: #7f5388;
            font-size: 1.2em;
            font-weight: 900;
        }
        .content .textBox a {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 20px;
            background-image: url('./imgs/key.png');
            color: #fff;
            border-radius: 40px;
            font-weight: 500;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .content .imgBox {
            width: 600px;
            /* background-color: orange; */
            display: flex;
            justify-content: flex-end;
            padding-right: 50px;
            margin-top: 50px;

        }

        .content .imgBox img {
            max-width: 340px;
        }

        .thumb {
            position: absolute;
            bottom: 20px;
            display: flex;
            left: 50%;
            transform: translateX(-50%);
        }
        .thumb li {
            list-style: none;
            margin: 0 20px;
            cursor: pointer;
            transition: .3s;
        }
        .thumb li:hover {
            transform: translateY(-15px);
        }
        .thumb li img {
            max-width: 60px;
        }

        .sci {
            position: absolute;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .sci li {
            list-style: none;
        }
        .circle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #7f5388;
            clip-path: circle(600px at right 800px);
        }

    </style>
</head>
<body>
    
    <section>
        <div class="circle"></div>
        <header>
            <a href="" class="logo"><img src="./imgs/logo.png" alt=""></a>
            <ul>
                <li><a href="">Home</a></li>
                <li><a href="">Menu</a></li>
                <li><a href="">What's New</a></li>
                <li><a href="">Find Us</a></li>
            </ul>
        </header>
        <div class="content">
            <div class="textBox">
                <h2>You're Invited to the <br><span>Mad Tea Time</span></h2>
                <p>Do come in.<br>We've saved you a seat.<br>A tea party invitation for the tired wioitor -<br>escape here for a while and stay for conversation.</p>
                <a href="">Make a Reservation</a>
            </div>

            <div class="imgBox">
                <img src="./imgs/img1.png" alt="" class="starbucks">
            </div>
        </div>
        <ul class="thumb">
            <li><img src="./imgs/thumb1.png" alt="" onclick="imgSlider('./imgs/img1.png');changeCircleColor('#017143')"></li>
            <li><img src="./imgs/thumb2.png" alt="" onclick="imgSlider('./imgs/img2.png');changeCircleColor('#eb7495')"></li>
            <li><img src="./imgs/thumb3.png" alt="" onclick="imgSlider('./imgs/img3.png');changeCircleColor('#d752b1')"></li>
        </ul>
        <ul class="sci">
            <li><a href=""><img src="./imgs/facebook.png" alt=""></a></li>
            <li><a href=""><img src="./imgs/twitter.png" alt=""></a></li>
            <li><a href=""><img src="./imgs/instagram.png" alt=""></a></li>
        </ul>
    </section>

    <script>
        function imgSlider(anything) {
            document.querySelector('.starbucks').src = anything;
        }

        function changeCircleColor(color) {
            const circle = document.querySelector('.circle');
            circle.style.background = color;
        }

    </script>
</body>
</html>
